services:
  # Microsoft SQL Server Database
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qrdine-sqlserver
    environment:
      - ACCEPT_EULA=${ACCEPT_EULA}
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express
      - MSSQL_MEMORY_LIMIT_MB=1536
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - qrdine-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'echo ''SELECT 1'' | /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -C',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qrdine-redis
    volumes:
      - redis_data:/data
    networks:
      - qrdine-network
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # .NET API Application
  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: qrdine-api
    depends_on:
      sql-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "${MSSQL_CONNECTION_STRING}"
      Redis__ConnectionString: "${REDIS_CONNECTION_STRING}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__ValidIssuer: "${JWT_VALID_ISSUER}"
      Jwt__ValidAudience: "${JWT_VALID_AUDIENCE}"
      Jwt__AccessTokenExpiryMinutes: "${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}"
      Jwt__RefreshTokenExpiryDays: "${JWT_REFRESH_TOKEN_EXPIRY_DAYS}"
      Cloudinary__CloudName: "${CLOUDINARY_CLOUD_NAME}"
      Cloudinary__ApiKey: "${CLOUDINARY_API_KEY}"
      Cloudinary__ApiSecret: "${CLOUDINARY_API_SECRET}"
      FrontendSettings__BaseUrl: "${FRONTEND_BASE_URL}"
      Cors__AllowedOrigins__0: "${CORS_ALLOWED_ORIGIN_1}"
      Cors__AllowedOrigins__1: "${CORS_ALLOWED_ORIGIN_2}"
      Cors__AllowedOrigins__2: "${CORS_ALLOWED_ORIGIN_3}"
      SecuritySettings__TokenHashSecret: "${SECURITY_TOKEN_HASH_SECRET}"
      EmailSettings__SmtpServer: "${EMAIL_SMTP_SERVER}"
      EmailSettings__Port: "${EMAIL_SMTP_PORT}"
      EmailSettings__SenderEmail: "${EMAIL_SENDER_EMAIL}"
      EmailSettings__SenderName: "${EMAIL_SENDER_NAME}"
      EmailSettings__Password: "${EMAIL_SENDER_PASSWORD}"
      PayOS__ClientId: "${PAYOS_CLIENT_ID}"
      PayOS__ApiKey: "${PAYOS_API_KEY}"
      PayOS__ChecksumKey: "${PAYOS_CHECKSUM_KEY}"
      RunMigrations: "${RUN_MIGRATIONS}"
      Seq__ServerUrl: "${SEQ_SERVER_URL}"
      Seq__ApiKey: "${SEQ_API_KEY}"
    volumes:
      - ./logs:/app/logs
    networks:
      - qrdine-network
      - traefik-public
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qrdine-api.rule=Host(`api.qrdine.me`)"
      - "traefik.http.routers.qrdine-api.entrypoints=websecure"
      - "traefik.http.routers.qrdine-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.qrdine-api.loadbalancer.server.port=8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Seq Log Management
  seq:
    image: datalust/seq:latest
    container_name: qrdine-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_ADMIN_PASSWORD}
    volumes:
      - seq_data:/data
    networks:
      - qrdine-network
      - traefik-public
    expose:
      - "5341"
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qrdine-seq.rule=Host(`logs.qrdine.me`)"
      - "traefik.http.routers.qrdine-seq.entrypoints=websecure"
      - "traefik.http.routers.qrdine-seq.tls.certresolver=letsencrypt"
      - "traefik.http.services.qrdine-seq.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local
  seq_data:
    driver: local

networks:
  qrdine-network:
    driver: bridge
  traefik-public:
    external: true
